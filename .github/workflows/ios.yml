name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html www/index.html || true

      - name: Initialize and Sync Capacitor
        run: |
          rm -rf ios
          npx cap add ios
          npx cap sync ios
          # Verify workspace path
          ls -R ios/App | grep .xcworkspace || find . -name "*.xcworkspace"

      - name: Build Xcode Project
        run: |
          WORKSPACE_PATH=$(find . -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE_PATH" ]; then
            echo "Error: No workspace found!"
            exit 1
          fi
          echo "Found workspace at: $WORKSPACE_PATH"
          
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find build -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app found!"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r MaamCindyPortfolio.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portfolio-IPA
          path: MaamCindyPortfolio.ipa
